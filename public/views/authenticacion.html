      <main class="auth-container--section">
        <!-- Bloque Principal de Autenticación -->
        <section class="auth-box">
          <!-- Lado Izquierdo: Formulario de Login -->
          <div class="auth-panel auth-panel--login">
            <div class="panel-header">
              <span class="panel-header__subtitle">Welcome Back</span>
              <h2 class="panel-header__title">Log In</h2>
            </div>

            <form class="auth-form" action="/api/login" method="POST">
              <div class="auth-form__group">
                <label class="auth-form__label" for="login-email">Email</label>
                <input
                  class="auth-form__input"
                  id="login-email"
                  name="email"
                  type="email"
                  placeholder="Enter your email address"
                />
              </div>

              <div class="auth-form__group">
                <label class="auth-form__label" for="login-password"
                  >Password</label
                >
                <input
                  class="auth-form__input"
                  id="login-password"
                  name="password"
                  type="password"
                  placeholder="Enter your password"
                />
              </div>

              <button class="auth-btn auth-btn--primary" type="submit">
                Log In
              </button>

              <p class="auth-footer-text">
                Don't have an account?
                <a href="#" class="auth-link" id="go-to-register">Sign Up</a>
              </p>
            </form>
          </div>

          <!-- Lado Derecho: Formulario de Registro -->
          <div class="auth-panel auth-panel--register">
            <div class="panel-header">
              <span class="panel-header__subtitle">Register Now</span>
              <h2 class="panel-header__title">Sign Up</h2>
            </div>

            <form class="auth-form" action="/api/register" method="POST">
              <div class="auth-form__group">
                <label class="auth-form__label" for="reg-name">Name</label>
                <input
                  class="auth-form__input"
                  id="reg-name"
                  name="name"
                  type="text"
                  placeholder="Enter your full name"
                />
              </div>

              <div class="auth-form__group">
                <label class="auth-form__label" for="reg-email">Email</label>
                <input
                  class="auth-form__input"
                  id="reg-email"
                  name="email"
                  type="email"
                  placeholder="Enter your email address"
                />
              </div>

              <div class="auth-form__group">
                <label class="auth-form__label" for="reg-password"
                  >Password</label
                >
                <input
                  class="auth-form__input"
                  id="reg-password"
                  name="password"
                  type="password"
                  placeholder="Create a password"
                />
              </div>

              <div class="auth-form__group">
                <label class="auth-form__label" for="reg-confirm"
                  >Confirm Password</label
                >
                <input
                  class="auth-form__input"
                  id="reg-confirm"
                  name="confirm-password"
                  type="password"
                  placeholder="Repeat your password"
                />
              </div>

              <button class="auth-btn auth-btn--secondary" type="submit">
                Sign Up
              </button>

              <p class="auth-footer-text">
                Already have an account?
                <a href="#" class="auth-link" id="go-to-login">Log In</a>
              </p>
            </form>
          </div>
        </section>
